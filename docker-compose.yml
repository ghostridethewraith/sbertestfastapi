services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8000}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  app:
    build: .
    image: ${APP_IMAGE:-sbertestfastapi:local}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      BINDING_TTL_SECONDS: ${BINDING_TTL_SECONDS:-300}
    expose:
      - "8000"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
