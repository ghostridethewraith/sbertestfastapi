name: Test, Build, Deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: meta
        run: |
          IMAGE="${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "$IMAGE" -t "${IMAGE_NAME}:latest" .
          docker push "$IMAGE"
          docker push "${IMAGE_NAME}:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_PATH: ${{ secrets.SERVER_PATH || '/opt/ip-service' }}
      HTTP_PORT: ${{ secrets.HTTP_PORT || '80' }}
      BINDING_TTL_SECONDS: ${{ secrets.BINDING_TTL_SECONDS || '300' }}
    steps:
      - name: Checkout
        if: env.SERVER_HOST != '' && env.SERVER_USER != '' && env.SERVER_SSH_KEY != ''
        uses: actions/checkout@v4

      - name: Copy compose files to server
        if: env.SERVER_HOST != '' && env.SERVER_USER != '' && env.SERVER_SSH_KEY != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ env.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx.conf"
          target: ${{ env.SERVER_PATH }}

      - name: Deploy on server
        if: env.SERVER_HOST != '' && env.SERVER_USER != '' && env.SERVER_SSH_KEY != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ env.SERVER_SSH_KEY }}
          script: |
            set -e
            cd "${{ env.SERVER_PATH }}"
            printf 'APP_IMAGE=%s\nBINDING_TTL_SECONDS=%s\nHTTP_PORT=%s\n' \
              "${{ needs.build-and-push.outputs.image }}" \
              "${{ env.BINDING_TTL_SECONDS }}" \
              "${{ env.HTTP_PORT }}" > .env
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml ps
            curl -fsS "http://127.0.0.1:${{ env.HTTP_PORT }}/healthz"

      - name: Skip deploy
        if: env.SERVER_HOST == '' || env.SERVER_USER == '' || env.SERVER_SSH_KEY == ''
        run: echo "Server SSH secrets are not configured; image was built and pushed only."
