name: Test, Build, Deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: meta
        run: |
          IMAGE="${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_PATH: ${{ secrets.SERVER_PATH || '/opt/ip-service' }}
      HTTP_PORT: ${{ secrets.HTTP_PORT || '80' }}
      BINDING_TTL_SECONDS: ${{ secrets.BINDING_TTL_SECONDS || '300' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ env.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx.prod.conf"
          target: ${{ env.SERVER_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ env.SERVER_SSH_KEY }}
          script: |
            set -e
            cd "${{ env.SERVER_PATH }}"
            printf 'APP_IMAGE=%s\nBINDING_TTL_SECONDS=%s\nHTTP_PORT=%s\n' \
              "${{ needs.build-and-push.outputs.image }}" \
              "${{ env.BINDING_TTL_SECONDS }}" \
              "${{ env.HTTP_PORT }}" > .env
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml ps
            for attempt in $(seq 1 30); do
              if curl -kfsS "https://127.0.0.1:${{ env.HTTP_PORT }}/healthz"; then
                exit 0
              fi
              sleep 2
            done
            docker compose -f docker-compose.prod.yml logs --tail=100
            exit 1
